<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>FinePrint: Terms & Conditions Analyzer</title>
    <style>
        body { width: 100%; font-family: system-ui, serif; padding: 16px; margin: 0; background-color: rgb(183, 224, 245); color: white; }
        h1 { font-size: 25px; margin: 0 0 4px; }
        #status { color: #ebe9e9; font-size: 13px; margin-bottom: 12px; }
        #results { color: navy; }
        #concerns-checklist { color: navy; }
    </style>
</head>
<body>
    <h1>🔍 FinePrint: Terms & Conditions Analyzer 🔍 </h1>

    <div id="concerns-checklist">
        <input type="checkbox" id= "1" value="Data Collection & Sharing">
        <label for="1">Data Collection & Sharing</label><br>

        <input type="checkbox" id= "2" value="Tracking & Profiling">
        <label for="2">Tracking & Profiling</label><br>

        <input type="checkbox" id= "3" value="Your Content and IP">
        <label for="3">Your Content and IP</label><br>

        <input type="checkbox" id= "4" value="Policy Changes">
        <label for="4">Policy Changes</label><br>

        <input type="checkbox" id= "5" value="Financial & Subscriptions">
        <label for="5">Financial & Subscriptions</label><br>

        <input type="button" id="concerns-button" value="Submit">
    </div>

    <div id="status"></div>
    <div id="results"></div>

    <script type="module" src="sidepanel.js"></script>

    <!-- load the pdf.js library as a module
    <script type="module">
        import * as pdfjsLib from 'https://mozilla.github.io/pdf.js/build/pdf.mjs';

        pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://mozilla.github.io/pdf.mjs/build/pdf.worker.mjs';
    </script> -->
    
</body>
</html>
